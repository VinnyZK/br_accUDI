services:
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-openudi-dev-2026}"
      NEO4J_server_memory_heap_initial__size: "${NEO4J_HEAP:-2g}"
      NEO4J_server_memory_heap_max__size: "${NEO4J_HEAP:-2g}"
      NEO4J_server_memory_pagecache_size: "${NEO4J_PAGECACHE:-2g}"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    user: "${NEO4J_UID:-7474}:${NEO4J_GID:-7474}"
    volumes:
      - neo4j-data:/data
      - ./infra/neo4j:/import
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-openudi-dev-2026}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      target: api
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "${NEO4J_USER:-neo4j}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-openudi-dev-2026}"
      NEO4J_DATABASE: "${NEO4J_DATABASE:-neo4j}"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY:-change-me-in-production-min-32-chars!!}"
      APP_ENV: "${APP_ENV:-dev}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:3000}"
      PATTERNS_ENABLED: "${PATTERNS_ENABLED:-false}"
      PUBLIC_MODE: "${PUBLIC_MODE:-true}"
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      target: frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: "${VITE_API_URL:-http://localhost:8000}"
      VITE_PUBLIC_MODE: "${VITE_PUBLIC_MODE:-true}"
    depends_on:
      api:
        condition: service_healthy

  etl:
    build:
      context: .
      target: etl
    profiles: ["etl"]
    environment:
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "${NEO4J_USER:-neo4j}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-openudi-dev-2026}"
      NEO4J_DATABASE: "${NEO4J_DATABASE:-neo4j}"
    volumes:
      - .:/workspace
    working_dir: /workspace
    depends_on:
      neo4j:
        condition: service_healthy

volumes:
  neo4j-data:
